server {
    listen 80;
    server_name planning.exemple.fr;

    # Certbot modifiera ce bloc pour la redirection HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name planning.exemple.fr;

    # Les certificats seront configurés par certbot
    # ssl_certificate /etc/letsencrypt/live/planning.exemple.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/planning.exemple.fr/privkey.pem;

    # --- Sécurité SSL ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Headers de sécurité ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Limites ---
    client_max_body_size 10M;

    # --- Logs ---
    access_log /var/log/nginx/planning-location.access.log;
    error_log  /var/log/nginx/planning-location.error.log;

    # --- Proxy vers l'app .NET ---
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts pour Blazor Server (SignalR / WebSocket)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Cache des fichiers statiques ---
    location /_content/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /_framework/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_cache_bypass $http_upgrade;
        expires 7d;
        add_header Cache-Control "public";
    }
}
