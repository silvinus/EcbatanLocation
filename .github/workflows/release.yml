name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache/save@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

  publish:
    runs-on: ubuntu-latest
    needs: [setup, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore

      - name: Publish (linux-x64 self-contained)
        run: |
          dotnet publish src/EcbatanLocation.Web/EcbatanLocation.Web.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:Version=${{ needs.setup.outputs.version }} \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            --output ./publish

      - name: Create archive
        run: |
          cd publish
          tar -czf ../ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [setup, publish]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz
