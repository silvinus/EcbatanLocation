name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Cible de déploiement'
        type: choice
        options:
          - northflank
          - fly
        default: northflank

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Cache NuGet packages
        uses: actions/cache/save@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore

      - name: Run tests
        env:
          DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
        run: dotnet test --no-restore --logger "console;verbosity=detailed" --logger GitHubActions

  publish:
    runs-on: ubuntu-latest
    needs: [setup, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore

      - name: Publish (linux-x64 self-contained)
        run: |
          dotnet publish src/EcbatanLocation.Web/EcbatanLocation.Web.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:Version=${{ needs.setup.outputs.version }} \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            --output ./publish

      - name: Create archive
        run: |
          cd publish
          tar -czf ../ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-archive
          path: ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [setup, publish]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: release-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ecbatan-location-${{ needs.setup.outputs.version }}-linux-x64.tar.gz

  deploy-northflank:
    if: inputs.target != 'fly'
    runs-on: ubuntu-latest
    needs: [test, release]
    concurrency:
      group: northflank-deploy
      cancel-in-progress: false
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to Northflank
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          service-id: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          image-path: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          credentials-id: ${{ secrets.NORTHFLANK_CREDENTIALS_ID }}

  deploy-fly:
    if: inputs.target == 'fly'
    runs-on: ubuntu-latest
    needs: [test, release]
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
