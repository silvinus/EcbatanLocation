name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

      - name: Publish (linux-x64 self-contained)
        run: |
          dotnet publish src/EcbatanLocation.Web/EcbatanLocation.Web.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            --output ./publish

      - name: Create archive
        run: |
          cd publish
          tar -czf ../ecbatan-location-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ecbatan-location-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
