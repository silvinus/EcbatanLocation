name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        env:
          DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=detailed" --logger GitHubActions

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.txt
          # Remove known suppressed advisories (no fix available in 2.x series, prod uses PostgreSQL)
          grep -v 'GHSA-2m69-gcr7-jv3q' audit.txt > filtered.txt
          ! grep -q 'has the following vulnerable packages' filtered.txt
