changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🐛 Corrections
      labels:
        - bug
        - fix
    - title: 🚀 Fonctionnalités
      labels:
        - enhancement
        - feat
        - feature
    - title: ♻️ Refactoring
      labels:
        - refactor
    - title: 📝 Documentation
      labels:
        - documentation
        - docs
    - title: 🤖 Dépendances
      labels:
        - dependencies
    - title: 🔧 CI / Build
      labels:
        - ci
    - title: 🧹 Maintenance
      labels:
        - chore
    - title: 🔄 Autres changements
      labels:
        - "*"
